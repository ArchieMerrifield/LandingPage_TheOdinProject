<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LandingPage_TheOdinProject</title>
</head>
<body>
    <div class="header">
        <div class="navigationBar">
            <div class="headerLogo"></div>
            <div class="links"></div>
        </div>
        <div class="headerInformation">
            <div class="heroSection">
                <h1 class="heroText">This website is awesome</h1>
                <div class="heroSubText"></div>
                <button class="headerSignUp">Sign up</button>
            </div>
            <div class="headerImage"></div>
        </div>
    </div>
    <div class="informationSection">
        <div class="informationTitle">Some random information</div>
        <div class="informationText"></div>
    </div>
    <div class="quoteSection">
        <div class="quoteContent"></div>
        <div class="quoteCredit"></div>
    </div>
    <div class="signUpSection">
        <div class="signUpBanner">
            <div class="bannerContent">
                <div class="bannerTitle"></div>
                <div class="bannerSubText"></div>
            </div>
            <button class="bannerButton">Sign up</button>
        </div>
    </div>
    <div class="footer">
        <div class="footerText">Copyright &copy The Odin Project</div>
    </div>
</body>
</html>
